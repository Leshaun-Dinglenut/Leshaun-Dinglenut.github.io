<!DOCTYPE html>

    <style>
        /* PASTE YOUR CSS CODE HERE */
        body {
            background-color: #050505;
            color: #00d4ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        .arc-reactor {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border: 4px solid #00d4ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px #00d4ff, inset 0 0 15px #00d4ff;
            transition: all 0.3s ease;
        }

        .arc-reactor:hover {
            box-shadow: 0 0 30px #00d4ff, inset 0 0 30px #00d4ff;
            transform: scale(1.05);
        }

        .arc-reactor.active {
            animation: pulse 1s infinite;
            background-color: rgba(0, 212, 255, 0.1);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px #00d4ff; }
            50% { box-shadow: 0 0 40px #00d4ff; }
            100% { box-shadow: 0 0 15px #00d4ff; }
        }

        h1 {
            letter-spacing: 5px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00d4ff;
        }

        #transcript {
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
