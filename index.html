<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION MONITOR | ALPHA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0b0e14;
            color: #e6edf3;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 10px 20px;
            border-bottom: 2px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px; /* Map on left, sidebar on right */
            flex-grow: 1;
        }

        /* Map Styling */
        #map {
            height: 100%;
            width: 100%;
            background: #0b0e14;
        }

        /* Sidebar Styling */
        .sidebar {
            background-color: #0d1117;
            border-left: 2px solid #30363d;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 4px;
        }

        .card-title {
            color: #58a6ff;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .log-entry {
            font-size: 0.75rem;
            margin-bottom: 8px;
            border-left: 2px solid #238636;
            padding-left: 10px;
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #3fb950;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* Small fix for map popup text color */
