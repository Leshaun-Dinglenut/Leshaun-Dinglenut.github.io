<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION MONITOR | ALPHA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0b0e14;
            color: #e6edf3;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 10px 20px;
            border-bottom: 2px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            flex-grow: 1;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #0b0e14;
        }

        .sidebar {
            background-color: #0d1117;
            border-left: 2px solid #30363d;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 4px;
        }

        .card-title {
            color: #58a6ff;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .log-entry {
            font-size: 0.75rem;
            margin-bottom: 12px;
            border-left: 2px solid #d29922;
            padding-left: 10px;
            line-height: 1.4;
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #3fb950;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* Map Popup Customization */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #161b22 !important;
            color: #ffffff !important;
            border: 1px solid #58a6ff;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <div>CMD//SITUATION_ROOM</div>
    <div style="font-size: 0.8rem;">INTEL_STREAM: <span class="blink">ACTIVE</span></div>
</header>

<div class="dashboard">
    <div id="map"></div>

    <aside class="sidebar">
        <div class="card">
            <div class="card-title">System Time (GMT+8)</div>
            <div id="clock" style="font-size: 1.5rem; font-weight: bold;">00:00:00</div>
        </div>

        <div class="card">
            <div class="card-title">Global Event Log</div>
            <div id="event-log">
                </div>
        </div>
        
        <div class="card">
            <div class="card-title">System Load</div>
            <p style="font-size: 0.8rem; margin: 0;">Buffer: Stable</p>
            <div style="background: #30363d; height: 5px; margin-top: 10px; border-radius: 5px;">
                <div style="background: #3fb950; width: 85%; height: 100%; border-radius: 5px;"></div>
            </div>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([38, 65], 4);

    // 2. Dark Mode Tiles (CartoDB)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // 3. News & Intel Data Array
    // Add or change locations here. Format: [Latitude, Longitude]
    const liveEvents = [
        { lat: 41.3, lng: 69.3, title: "TASHKENT HUB", desc: "Primary data node reporting 99% uptime." },
        { lat: 34.5, lng: 69.1, title: "KABUL TRANSIT", desc: "Logistics corridor cleared for transport." },
        { lat: 43.2, lng: 76.8, title: "ALMATY SECTOR", desc: "Routine maintenance on regional servers." },
        { lat: 37.9, lng: 58.3, title: "ASHGABAT ALERT", desc: "Anomalous signal detected in northern sector." },
        { lat: 40.2, lng: 44.5, title: "YEREVAN NODE", desc: "Synchronization with main frame complete." }
    ];

    const logContainer = document.getElementById('event-log');

    // 4. Function to generate markers and sidebar entries
    liveEvents.forEach(event => {
        // Create gold circle marker
        const marker = L.circleMarker([event.lat, event.lng], {
            radius: 7,
            fillColor: "#d29922",
            color: "#fff",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map);

        marker.bindPopup(`<b>${event.title}</b><br>${event.desc}`);

        // Create sidebar entry
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<strong>${event.title}</strong><br>${event.desc}`;
        logContainer.appendChild(entry);
    });

    // 5. Clock GMT+8 (Singapore/Perth/Beijing Time)
    function updateClock() {
        const now = new Date();
        const gmt8Time = now.toLocaleTimeString('en-GB', { 
            timeZone: 'Asia/Shanghai', 
            hour12: false 
        });
        document.getElementById('clock').innerText = gmt8Time;
    }
    
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
