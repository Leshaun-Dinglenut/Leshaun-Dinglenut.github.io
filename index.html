<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION MONITOR | GLOBAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0b0e14;
            color: #e6edf3;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 10px 20px;
            border-bottom: 2px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        .search-box {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 5px 15px;
            border-radius: 20px;
            font-family: monospace;
            outline: none;
            width: 250px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #0b0e14;
        }

        .sidebar {
            background-color: #0d1117;
            border-left: 2px solid #30363d;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 4px;
        }

        .card-title {
            color: #58a6ff;
            font-size: 0.75rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #3fb950;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* Map Popup Customization */
        .leaflet-popup-content-wrapper {
            background: #161b22 !important;
            color: #ffffff !important;
            border: 1px solid #58a6ff;
            border-radius: 4px;
            font-family: monospace;
        }
        .leaflet-popup-tip { background: #58a6ff !important; }

        /* Custom Scrollbar for Sidebar */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: #0d1117; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">CMD//SITUATION_ROOM</div>
    <input type="text" class="search-box" placeholder="SEARCH COORDINATES...">
    <div style="font-size: 0.8rem;">INTEL_STREAM: <span class="blink">ACTIVE</span></div>
</header>

<div class="dashboard">
    <div id="map"></div>

    <aside class="sidebar">
        <div class="card">
            <div class="card-title">System Time (GMT+8)</div>
            <div id="clock" style="font-size: 1.8rem; font-weight: bold; color: #e6edf3;">00:00:00</div>
        </div>

        <div class="card" style="flex-grow: 1; display: flex; flex-direction: column;">
            <div class="card-title">
                Live World Intel 
                <span style="color: #d29922;">● LIVE</span>
            </div>
            <div style="flex-grow: 1; min-height: 400px; border: 1px solid #30363d; border-radius: 4px; overflow: hidden;">
                <iframe 
                    src="https://rss.app/embed/v1/ticker/tL9zZp5mX6T0A3k8" 
                    frameborder="0" 
                    style="width: 100%; height: 100%; background: #161b22;">
                </iframe>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Global Connectivity</div>
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px;">
                <span>Uplink: Stable</span>
                <span>85%</span>
            </div>
            <div style="background: #30363d; height: 4px; border-radius: 2px;">
                <div style="background: #3fb950; width: 85%; height: 100%; border-radius: 2px;"></div>
            </div>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Map - Zoomed out more to see the world
    const map = L.map('map').setView([20, 10], 2);

    // 2. Dark Mode Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 3. World News Marker Locations
    const globalPoints = [
        { lat: 40.7128, lng: -74.0060, title: "NEW YORK", desc: "Financial markets reporting high volatility." },
        { lat: 51.5074, lng: -0.1278, title: "LONDON", desc: "New tech regulation debates ongoing in parliament." },
        { lat: 35.6762, lng: 139.6503, title: "TOKYO", desc: "Advancements in robotics announced at tech summit." },
        { lat: 1.3521, lng: 103.8198, title: "SINGAPORE", desc: "Regional trade logistics hitting peak efficiency." },
        { lat: -33.8688, lng: 151.2093, title: "SYDNEY", desc: "Pacific monitoring station reports clear signals." }
    ];

    globalPoints.forEach(point => {
        const marker = L.circleMarker([point.lat, point.lng], {
            radius: 6,
            fillColor: "#58a6ff",
            color: "#fff",
            weight: 1,
            fillOpacity: 0.8
        }).addTo(map);

        marker.bindPopup(`<b>${point.title}</b><br>${point.desc}`);
    });

    // 4. Clock Function (GMT+8)
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-GB', { 
            timeZone: 'Asia/Shanghai', 
            hour12: false 
        });
        document.getElementById('clock').innerText = timeStr;
    }
    
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
