<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION MONITOR | ALPHA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0b0e14;
            color: #e6edf3;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 10px 20px;
            border-bottom: 2px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            flex-grow: 1;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #0b0e14;
        }

        .sidebar {
            background-color: #0d1117;
            border-left: 2px solid #30363d;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 4px;
        }

        .card-title {
            color: #58a6ff;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .log-entry {
            font-size: 0.75rem;
            margin-bottom: 8px;
            border-left: 2px solid #238636;
            padding-left: 10px;
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #3fb950;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* Map Popup Fixes */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #161b22 !important;
            color: #ffffff !important;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

<header>
    <div>CMD//SITUATION_ROOM</div>
    <div style="font-size: 0.8rem;">STATUS: <span class="blink">ONLINE</span></div>
</header>

<div class="dashboard">
    <div id="map"></div>

    <aside class="sidebar">
        <div class="card">
            <div class="card-title">System Time (GMT+8)</div>
            <div id="clock" style="font-size: 1.5rem; font-weight: bold;">00:00:00</div>
        </div>

        <div class="card">
            <div class="card-title">Live Intelligence Feed</div>
            <div class="log-entry">18:00 - Data synchronization complete.</div>
            <div class="log-entry">17:44 - Monitoring Central Asia sector.</div>
            <div class="log-entry" style="border-color: #d29922;">17:15 - Atmospheric shift detected.</div>
        </div>
        
        <div class="card">
            <div class="card-title">Sector Status</div>
            <p style="font-size: 0.8rem; margin: 0;">Operational Load: 42%</p>
            <div style="background: #30363d; height: 5px; margin-top: 10px; border-radius: 5px;">
                <div style="background: #58a6ff; width: 42%; height: 100%; border-radius: 5px;"></div>
            </div>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Initialize Map
    const map = L.map('map').setView([40, 70], 4);

    // Dark Mode Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // Marker
    const marker = L.marker([41.3, 69.3]).addTo(map);
    marker.bindPopup("<b>Primary Node</b><br>Tashkent Sector Monitoring.").openPopup();

    // Clock GMT+8
    function updateClock() {
        const now = new Date();
        const gmt8Time = now.toLocaleTimeString('en-GB', { 
            timeZone: 'Asia/Shanghai', 
            hour12: false 
        });
        document.getElementById('clock').innerText = gmt8Time;
    }
    
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
