<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION MONITOR | GLOBAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0b0e14;
            color: #e6edf3;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 10px 20px;
            border-bottom: 2px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 5px 15px;
            border-radius: 20px;
            font-family: monospace;
            outline: none;
            width: 250px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #0b0e14;
        }

        .sidebar {
            background-color: #0d1117;
            border-left: 2px solid #30363d;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 4px;
        }

        .card-title {
            color: #58a6ff;
            font-size: 0.75rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* News Ticker Styling */
        #news-ticker {
            font-size: 0.8rem;
            line-height: 1.6;
            color: #d29922;
            height: 450px;
            overflow: hidden;
        }

        .news-item {
            border-bottom: 1px solid #30363d;
            padding: 8px 0;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #3fb950;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* Map Popup Customization */
        .leaflet-popup-content-wrapper {
            background: #161b22 !important;
            color: #ffffff !important;
            border: 1px solid #58a6ff;
            border-radius: 4px;
        }
        .leaflet-popup-tip { background: #58a6ff !important; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">CMD//SITUATION_ROOM</div>
    <input type="text" class="search-box" placeholder="SEARCH COORDINATES...">
    <div style="font-size: 0.8rem;">INTEL_STREAM: <span class="blink">ACTIVE</span></div>
</header>

<div class="dashboard">
    <div id="map"></div>

    <aside class="sidebar">
        <div class="card">
            <div class="card-title">System Time (GMT+8)</div>
            <div id="clock" style="font-size: 1.8rem; font-weight: bold;">00:00:00</div>
        </div>

        <div class="card" style="flex-grow: 1;">
            <div class="card-title">Live World Intel <span class="blink" style="color: #f85149;">●</span></div>
            <div id="news-ticker">
                </div>
        </div>
        
        <div class="card">
            <div class="card-title">Global Connectivity</div>
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px;">
                <span>Uplink: Stable</span>
                <span>92%</span>
            </div>
            <div style="background: #30363d; height: 4px; border-radius: 2px;">
                <div style="background: #3fb950; width: 92%; height: 100%;"></div>
            </div>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([20, 10], 2);

    // 2. Dark Mode Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 3. News Database (Add your own news here!)
    const newsDatabase = [
        "BREAKING: Global tech summit announces new AI safety protocols.",
        "MARKETS: Tokyo stocks see 2% rise following trade agreement.",
        "WEATHER: Unusual solar activity detected; satellite comms stable.",
        "LOGISTICS: New shipping lane opened in North Atlantic sector.",
        "ENERGY: Renewable output hits record high in European grid.",
        "SECURITY: Cyber-defense systems upgraded across all nodes.",
        "INFO: Primary Node in Tashkent reporting 99% efficiency.",
        "TRADE: Singapore hub processes record volume of cargo."
    ];

    function updateNews() {
        const ticker = document.getElementById('news-ticker');
        const randomNews = newsDatabase[Math.floor(Math.random() * newsDatabase.length)];
        
        const newEntry = document.createElement('div');
        newEntry.className = 'news-item';
        newEntry.innerHTML = `<span style="color: #58a6ff;">></span> ${randomNews}`;
        
        ticker.prepend(newEntry);
        
        // Remove old news items to keep the sidebar clean
        if (ticker.children.length > 10) {
            ticker.lastChild.remove();
        }
    }

    // Update news every 4 seconds
    setInterval(updateNews, 4000);
    updateNews(); // Initial run

    // 4. Map Markers
    const locations = [
        { lat: 40.7, lng: -74, name: "New York Node" },
        { lat: 51.5, lng: -0.1, name: "London Node" },
        { lat: 35.6, lng: 139.6, name: "Tokyo Node" },
        { lat: 1.3, lng: 103.8, name: "Singapore Node" }
    ];

    locations.forEach(loc => {
        L.circleMarker([loc.lat, loc.lng], {
            radius: 6,
            fillColor: "#58a6ff",
            color: "#fff",
            weight: 1,
            fillOpacity: 0.8
        }).addTo(map).bindPopup(loc.name);
    });

    // 5. Clock (GMT+8)
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-GB', { 
            timeZone: 'Asia/Shanghai', 
            hour12: false 
        });
        document.getElementById('clock').innerText = timeStr;
    }
    
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
